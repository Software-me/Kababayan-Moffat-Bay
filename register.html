<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Loreine's Bay Resort Lodge</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav nav--left" aria-label="Section navigation">
        <a href="index.html" class="nav__link">Home</a>
        <a href="about.html" class="nav__link">About Us</a>
        <a href="attractions.html" class="nav__link">Attractions</a>
      </nav>

      <a href="index.html" class="brand" aria-label="Loreine's Bay Resort Lodge home">
        <span class="brand__mark" aria-hidden="true">
          <svg class="brand__svg" viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="1.75">
            <circle cx="12" cy="5" r="3" />
            <path d="M12 22V8M5 12H2a10 10 0 0 0 20 0h-3" />
          </svg>
        </span>
        <span class="brand__name">Loreine's Bay Resort Lodge</span>
      </a>

      <nav class="nav nav--right" aria-label="Account navigation">
        <a href="room_reservation.html" class="nav__link">Lodging</a>
        <a href="my_reservations.html" class="nav__link">My Reservations</a>
        <a href="contact.html" class="nav__link">Contact Us</a>
        <a href="login.html" class="btn btn--outline">Login/Register</a>
      </nav>
    </header>

    <section class="register-section" aria-labelledby="reg-heading">
      <div class="register-container">
        <h1 id="reg-heading">Register</h1>
        <p class="summary-card__note" style="margin-bottom: 1rem">
          Static preview — your <code>registration.php</code> should insert into <code>User</code> / <code>Login</code> on the server.
        </p>
        <form id="register-form" action="#" method="post">
          <div class="form-group">
            <label for="first_name">First name</label>
            <input type="text" id="first_name" name="first_name" required />
          </div>
          <div class="form-group">
            <label for="last_name">Last name</label>
            <input type="text" id="last_name" name="last_name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button type="submit" class="button">Register</button>
        </form>
        <p style="margin-top: 1.25rem; font-size: 0.95rem">
          Already have an account? <a href="login.html">Login</a> · <a href="index.html">Home</a>
        </p>
      </div>
    </section>

    <script>
      document.getElementById("register-form").addEventListener("submit", function (e) {
        e.preventDefault();
        alert("Static preview only — no account was created. Use registration.php with MySQL on your host.");
      });
    </script>
  </body>
</html>
